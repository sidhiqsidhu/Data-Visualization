<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Data Visualization</title>
  <style>
    :root {
      --bg1: #eef4ff;
      --bg2: #d8e8ff;
      --card: #ffffff;
      --text: #1c2a43;
      --muted: #51607a;
      --accent: #1d6fdc;
      --accent2: #185ab1;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      color: var(--text);
      background: linear-gradient(140deg, var(--bg1), var(--bg2));
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(820px, 100%);
      background: var(--card);
      border-radius: 16px;
      border: 1px solid #e5edf9;
      box-shadow: 0 12px 28px rgba(14, 38, 77, 0.12);
      padding: 28px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.4rem, 2.4vw, 2rem);
    }

    p {
      margin: 0 0 12px;
      color: var(--muted);
      line-height: 1.6;
    }

    .tag {
      display: inline-block;
      margin-top: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #edf4ff;
      color: var(--accent2);
      font-weight: 600;
      font-size: 0.92rem;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      text-decoration: none;
      background: var(--accent);
      color: #fff;
      padding: 10px 14px;
      border-radius: 10px;
      font-weight: 600;
    }

    a:hover { background: var(--accent2); }
  </style>
</head>
<body>
  <main>
    <h1>Data Visualization Project</h1>
    <p>This GitHub Pages site is configured for the Data-Visualization repository.</p>
    <p>Primary script available in this repo: <strong>Data_visualize_w4.py</strong>.</p>
    <span class="tag">GitHub Pages Ready</span>
    <br>
    <a href="https://github.com/sidhiqsidhu/Data-Visualization" target="_blank" rel="noopener">Open Repository</a>
  </main>
</body>
</html>
